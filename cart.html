<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - ShopSphere</title>
  
  <!-- CSS Link Sheets -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/cart.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

  <!-- Page Loader Overlay -->
  <div class="page-loader">
    <div class="spinner"></div>
  </div>

  <!-- Navbar Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Main Content -->
  <main>
    <div class="container" style="margin-top: 1rem;">
      <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 0.5rem; text-align: left;">Shopping Cart</h1>
      <p style="color: var(--text-secondary); margin-bottom: 2rem; text-align: left;">Review and manage your selected products before completing purchase</p>
      
      <!-- Cart page content placeholder -->
      <div id="cart-page-content">
        <div style="padding: 5rem 0; text-align: center; color: var(--text-secondary);">
          <h3>Loading your shopping cart...</h3>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="assets/js/app.js"></script>
  <script type="module" src="assets/js/cart.js"></script>
</body>
</html>
