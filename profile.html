<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - ShopSphere</title>
  
  <!-- CSS Link Sheets -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/checkout.css"> <!-- Reuses addresses selects styles -->
  <link rel="stylesheet" href="assets/css/profile.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

  <!-- Page Loader Overlay -->
  <div class="page-loader">
    <div class="spinner"></div>
  </div>

  <!-- Navbar Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Main Content -->
  <main>
    <div class="container" style="margin-top: 1rem;">
      
      <div class="profile-page-container">
        
        <!-- Left Sidebar Menu -->
        <aside class="profile-sidebar">
          <div class="profile-sb-header">
            <div class="profile-sb-avatar" id="profile-sb-avatar">JD</div>
            <div class="profile-sb-name" id="profile-sb-name">John Doe</div>
            <div class="profile-sb-email" id="profile-sb-email">johndoe@example.com</div>
          </div>
          
          <button class="profile-sb-btn active" data-pane="pane-details">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Profile Details
          </button>
          
          <button class="profile-sb-btn" data-pane="pane-addresses">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            Saved Addresses
          </button>
          
          <button class="profile-sb-btn" data-pane="pane-orders">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Order History
          </button>
        </aside>

        <!-- Right Side: Content Panes -->
        <section class="profile-panes-wrapper">
          
          <!-- PANE 1: PROFILE DETAILS -->
          <div class="profile-content-pane active" id="pane-details">
            <div class="card profile-pane-card">
              <h2 class="profile-pane-title">Contact Profile Information</h2>
              
              <form id="edit-profile-form">
                <div class="form-group">
                  <label class="form-label" for="p-name">Full Name</label>
                  <input type="text" class="form-control" id="p-name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                  <label class="form-label" for="p-email">Email Address</label>
                  <input type="email" class="form-control" id="p-email" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                  <label class="form-label" for="p-phone">Phone Number</label>
                  <input type="tel" class="form-control" id="p-phone" placeholder="9876543210" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: max-content; padding: 0.65rem 1.5rem; margin-top: 1rem;">Save Updates</button>
              </form>
            </div>
          </div>

          <!-- PANE 2: SAVED ADDRESSES -->
          <div class="profile-content-pane" id="pane-addresses">
            <div class="card profile-pane-card">
              <h2 class="profile-pane-title">Saved Shipping Addresses</h2>
              
              <!-- Address grid -->
              <div class="addresses-select-grid" id="profile-addresses-grid">
                <!-- Loaded dynamically in profile.js -->
              </div>

              <!-- Add address form inside profile -->
              <div style="margin-top: 3rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                <h3 style="font-size: 1.2rem; font-weight: 800; margin-bottom: 1.25rem;">Add a New Address</h3>
                
                <form id="profile-add-address-form">
                  <div class="form-group" style="max-width: 250px;">
                    <label class="form-label" for="p-addr-type">Address Type</label>
                    <select class="form-control" id="p-addr-type" style="padding: 0.65rem 1rem;">
                      <option value="Home">Home</option>
                      <option value="Office">Office</option>
                      <option value="Other">Other</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label class="form-label" for="p-addr-street">Street Address</label>
                    <input type="text" class="form-control" id="p-addr-street" placeholder="Flat / House / Lane details" required>
                  </div>

                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                      <label class="form-label" for="p-addr-city">City</label>
                      <input type="text" class="form-control" id="p-addr-city" placeholder="City" required>
                    </div>
                    <div class="form-group">
                      <label class="form-label" for="p-addr-state">State</label>
                      <input type="text" class="form-control" id="p-addr-state" placeholder="State" required>
                    </div>
                  </div>

                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                      <label class="form-label" for="p-addr-zip">ZIP / PIN Code</label>
                      <input type="text" class="form-control" id="p-addr-zip" placeholder="ZIP" required>
                    </div>
                    <div class="form-group">
                      <label class="form-label" for="p-addr-country">Country</label>
                      <input type="text" class="form-control" id="p-addr-country" value="India" required>
                    </div>
                  </div>

                  <button type="submit" class="btn btn-secondary" style="width: max-content; padding: 0.65rem 1.25rem;">Add Address</button>
                </form>
              </div>
            </div>
          </div>

          <!-- PANE 3: ORDER HISTORY -->
          <div class="profile-content-pane" id="pane-orders">
            <h2 class="profile-pane-title" style="margin-bottom: 1.5rem;">Your Order History</h2>
            <div class="order-history-list" id="profile-orders-list">
              <!-- Loaded dynamically in profile.js -->
            </div>
          </div>

        </section>

      </div>

    </div>
  </main>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="assets/js/app.js"></script>
  <script type="module" src="assets/js/profile.js"></script>
</body>
</html>
